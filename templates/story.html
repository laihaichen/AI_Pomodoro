<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
    <title>叙事面板</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <link rel="stylesheet" href="/static/story.css">
</head>

<body>
    <div class="header">
        <div></div>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/" class="setup-btn nav-link-btn">🍅 返回 Dashboard</a>
            <a href="/jury" class="setup-btn nav-link-btn">⚖️ 陪审团</a>
        </div>
    </div>

    <!-- ── 主标题区 ── -->
    <div class="story-hero">
        <div class="story-hero-icon">📖</div>
        <h1 class="story-hero-title">叙事面板</h1>
        <p class="story-hero-sub">模拟人生故事 · 自动随番茄钟推进</p>
    </div>

    <!-- ── 状态栏 ── -->
    <div class="story-status-bar" id="story-status-bar">
        <div class="status-item"><span class="status-label">角色</span><span id="s-character">—</span></div>
        <div class="status-item"><span class="status-label">年龄</span><span id="s-age">—</span></div>
        <div class="status-item"><span class="status-label">命运值</span><span id="s-fate">—</span></div>
        <div class="status-item"><span class="status-label">故事类型</span><span id="s-type">—</span></div>
        <div class="status-item"><span class="status-label">干预卡</span><span id="s-intervention">0</span></div>
        <div class="status-item"><span class="status-label">宿命卡</span><span id="s-destiny">0</span></div>
    </div>

    <!-- ── 当前故事 ── -->
    <div class="section-label">📜 当前故事</div>
    <div class="story-current-card" id="story-current-card">
        <div id="story-foretold-badge" class="story-foretold-badge" style="display:none;">
            📌 本轮参照上一轮事件：<span id="story-foretold-text"></span>
        </div>
        <div id="story-text-area" class="story-text">
            <p class="placeholder-text">等待第一轮番茄钟推进后生成故事…</p>
        </div>
        <div class="story-card-actions">
            <div id="story-loading" class="story-loading" style="display:none;">
                <div class="story-spinner"></div>
                <span>AI 正在生成故事…</span>
            </div>
            <button id="btn-rerun" class="story-action-btn rerun-btn" onclick="rerunStory()" style="display:none;" title="重新生成本轮故事">🔄 重新生成</button>
        </div>
    </div>

    <!-- ── 下一轮事件预判 ── -->
    <div class="section-label">🔮 下一轮事件预判</div>
    <div class="event-registry-grid" id="event-registry-grid">
        <div class="event-slot placeholder-slot">暂无事件预判</div>
    </div>

    <!-- ── 卡牌操作 ── -->
    <div class="card-actions-bar">
        <button id="btn-use-intervention" class="story-action-btn intervention-btn" onclick="openInterventionModal()" disabled>🎴 使用干预卡</button>
        <button id="btn-use-destiny" class="story-action-btn destiny-btn" onclick="openDestinyModal()" disabled>🃏 使用宿命卡</button>
        <span id="pending-destiny-badge" class="pending-badge" style="display:none;"></span>
    </div>

    <!-- ── 叙事设置 ── -->
    <div class="story-settings-bar" id="story-settings-bar">
        <span style="font-size:11px;color:var(--dim);margin-right:auto;">⚙️ 叙事设置</span>
        <button id="btn-disable-story" onclick="disableStoryGeneration(this)"
            style="padding:5px 12px;font-size:11px;font-weight:600;
                   background:var(--surface);border:1px solid var(--border);
                   border-radius:5px;color:var(--dim);cursor:pointer;transition:background 0.15s;"
            onmouseover="this.style.background='var(--border)';this.style.color='var(--bright)'"
            onmouseout="this.style.background='var(--surface)';this.style.color='var(--dim)'"
            title="本局游戏不生成故事（仅在reset后可恢复）">🚫 本局不生成故事</button>
    </div>

    <!-- ── 故事历史时间线 ── -->
    <div class="section-label" style="margin-top:24px;">📚 故事时间线 <span id="history-count">0</span> 轮</div>
    <div class="story-timeline" id="story-timeline">
        <p class="placeholder-text">暂无故事历史</p>
    </div>

    <!-- ── 干预卡 Modal ── -->
    <div class="modal-overlay" id="intervention-overlay" style="display:none;" onclick="if(event.target===this)closeInterventionModal()">
        <div class="modal" style="max-width:560px;width:95%;">
            <button class="modal-close" onclick="closeInterventionModal()">✕</button>
            <h2 style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--bright);">🎴 使用干预卡</h2>

            <!-- Step 1: 区间选择 -->
            <div id="intv-step1">
                <div style="font-size:13px;color:var(--dim);margin-bottom:8px;">请选择你希望修改的事件区间：</div>
                <select id="intv-zone-select" style="width:100%;padding:10px;background:var(--surface);border:1px solid var(--border);
                           border-radius:6px;color:var(--text);font-size:13px;outline:none;box-sizing:border-box;">
                    <option value="POS_HIGH">🟣 高度正面（85~100）</option>
                    <option value="POS_MID">🔵 中等正面（50~84）</option>
                    <option value="POS_LOW">🟢 轻度正面（1~49）</option>
                    <option value="NEG_LOW">🟡 轻度负面（-1~-29）</option>
                    <option value="NEG_MID">🟠 中等负面（-30~-59）</option>
                    <option value="NEG_HIGH">🔴 严重负面（-60~-89）</option>
                </select>
                <button onclick="intvNextStep()" style="margin-top:12px;width:100%;padding:9px;
                        background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.5);
                        border-radius:6px;color:#a78bfa;font-size:13px;font-weight:700;cursor:pointer;">
                    下一步 →
                </button>
            </div>

            <!-- Step 2: 剧情输入 -->
            <div id="intv-step2" style="display:none;">
                <div style="font-size:12px;color:var(--dim);margin-bottom:6px;">已选区间：<span id="intv-zone-display"
                        style="color:#a78bfa;font-weight:700;"></span></div>
                <div style="font-size:13px;color:var(--dim);margin-bottom:8px;">请填写你放在该区间的新事件描述：</div>
                <textarea id="intv-event-text" rows="5" placeholder="在此输入自定义事件描述…"
                    style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;
                           color:var(--text);font-size:13px;padding:10px;resize:vertical;outline:none;box-sizing:border-box;"></textarea>
                <div style="display:flex;gap:8px;margin-top:10px;">
                    <button onclick="intvBackStep()" style="flex:1;padding:9px;
                            background:transparent;border:1px solid var(--border);
                            border-radius:6px;color:var(--dim);font-size:13px;cursor:pointer;">← 返回</button>
                    <button onclick="intvSubmit()" style="flex:2;padding:9px;
                            background:rgba(167,139,250,0.2);border:1px solid rgba(167,139,250,0.6);
                            border-radius:6px;color:#a78bfa;font-size:13px;font-weight:700;cursor:pointer;">
                        ✨ 确认使用干预卡
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── 宿命卡 Modal ── -->
    <div class="modal-overlay" id="destiny-overlay" style="display:none;" onclick="if(event.target===this)closeDestinyModal()">
        <div class="modal" style="max-width:480px;width:95%;">
            <button class="modal-close" onclick="closeDestinyModal()">✕</button>
            <h2 style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--bright);">🃏 使用宿命卡</h2>
            <div style="font-size:13px;color:var(--dim);margin-bottom:8px;">请选择你希望在下一轮强制触发的命运值区间：</div>
            <select id="destiny-zone-select" style="width:100%;padding:10px;background:var(--surface);border:1px solid var(--border);
                       border-radius:6px;color:var(--text);font-size:13px;outline:none;box-sizing:border-box;">
                <option value="POS_HIGH">🟣 高度正面（85~100）</option>
                <option value="POS_MID">🔵 中等正面（50~84）</option>
                <option value="POS_LOW">🟢 轻度正面（1~49）</option>
                <option value="NEG_LOW">🟡 轻度负面（-1~-29）</option>
                <option value="NEG_MID">🟠 中等负面（-30~-59）</option>
                <option value="NEG_HIGH">🔴 严重负面（-60~-89）</option>
            </select>
            <button id="destiny-send-btn" onclick="destinySubmit()" style="margin-top:12px;width:100%;padding:9px;
                    background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.5);
                    border-radius:6px;color:#a855f7;font-size:13px;font-weight:700;cursor:pointer;">
                确认使用 →
            </button>
        </div>
    </div>

    <script src="/static/story.js"></script>
</body>

</html>
